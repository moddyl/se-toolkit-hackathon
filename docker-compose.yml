services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fitlog
      POSTGRES_PASSWORD: fitlog
      POSTGRES_DB: fitlog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitlog"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fitlog:fitlog@db:5432/fitlog
      QWEN_BASE_URL: ${QWEN_BASE_URL:-http://host.docker.internal:42005/v1}
      QWEN_CODE_API_KEY: ${QWEN_CODE_API_KEY:-dummy}
      QWEN_MODEL: ${QWEN_MODEL:-coder-model}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
